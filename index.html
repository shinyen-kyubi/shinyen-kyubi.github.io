            ]},
            { id: 'III', name: '慈愛', questions: [

            "II-VII": { trait: "円環", color: "黄金", name: "秩序の円環", narrative: "円環の調和を、覇道の意志で現実化。混乱を治めるための秩序を、優しくも確固たる力で構築します。", core: "調和という名の支配。" },
            "II-VIII": { trait: "円環", color: "鋼鉄", name: "不朽の土台", narrative: "不動の誠実さで調和を守ります。他者の拠り所となり続け、安定した循環を維持する守護者。", core: "誠実な守護。" },
            "II-IX": { trait: "円環", color: "蒼空", name: "自由な輪", narrative: "枠組みを超越しながらも、調和を忘れません。何ものにも縛られず、しかし全ての縁を大切にする軽やかな旅人。", core: "自在な繋がり。" },

            "III-I": { trait: "慈愛", color: "紅玉", name: "熱情の癒やし", narrative: "受容の心に、激しい推進力が加わります。他者のために自らを燃やし、状況を劇的に好転させる愛の闘士。", core: "行動する慈悲。" },
            "III-II": { trait: "慈愛", color: "瑠璃", name: "共感の輪", narrative: "他者の痛みを分かち合う心が、全体の調和へと繋がります。孤立を癒やし、再び人々を繋ぎ合わせる和の要。", core: "調和に満ちた奉仕。" },
            "III-III": { trait: "慈愛", color: "琥珀", name: "至高の愛", narrative: "無償の奉仕と共感が最高潮に。その存在そのものが癒やしとなり、周囲の孤独を溶かしていく聖なる旅。", core: "純粋な受容と育み。" },
            "III-IV": { trait: "慈愛", color: "白銀", name: "叡智の献身", narrative: "鋭い分析力を持って他者を助けます。何が真の救いになるのかを洞察し、論理的な愛を実践する賢者。", core: "見抜く知性と共感。" },
            "III-V": { trait: "慈愛", color: "漆黒", name: "幻想の救済", narrative: "創造性を活かして癒やしを具現化します。目に見えない祈りや想いを、形ある美しさへと変えて世界を救います。", core: "表現された愛。" },
            "III-VI": { trait: "慈愛", color: "翡翠", name: "沈黙の祈り", narrative: "深淵の静寂の中で他者に寄り添います。言葉を超えた深いレベルで魂に触れ、再誕を促す静かなる聖母。", core: "内なる愛の探求。" },
            "III-VII": { trait: "慈愛", color: "黄金", name: "王者の慈悲", narrative: "高い意志で人々を導き、守ります。理想郷を築くための原動力は、他者への深い共感と責任感です。", core: "支配と愛の統合。" },
            "III-VIII": { trait: "慈愛", color: "鋼鉄", name: "守護の抱擁", narrative: "不変の誠実さで大切な人を守り抜きます。誰が何と言おうと揺るがない、鉄壁の安定感を持つ愛の防壁。", core: "揺るぎない献身。" },
            "III-IX": { trait: "慈愛", color: "蒼空", name: "自由な博愛", narrative: "何ものにも縛られず、世界中の人々に光を届けます。境界線を越え、偏見なく愛を広める飛翔する心。", core: "執着なき共感。" },

            "IV-I": { trait: "叡智", color: "紅玉", name: "閃光の叡智", narrative: "真理の探求に激しい情熱が宿ります。分析だけでなく実行を伴い、理論を現実のものとする知の革命児。", core: "情熱的な真理探究。" },
            "IV-II": { trait: "叡智", color: "瑠璃", name: "調和の叡智", narrative: "複雑な事象を解き明かす知性が、全体のバランスのために機能。真理をもって人々の混乱を静める調律師。", core: "知的なバランス感覚。" },
            "IV-III": { trait: "叡智", color: "琥珀", name: "情愛の賢者", narrative: "知性に心の温かさが加わります。単なる論理ではなく、血の通った知恵によって人を導く慈悲深い探求者。", core: "感情を理解する理性。" },
            "IV-IV": { trait: "叡智", color: "白銀", name: "絶対真理", narrative: "分析、洞察、学びが極致に到達。あらゆる事象を解き明かし、暗闇に完全な光を当てる知の最高権威。", core: "純粋な論理と洞察。" },
            "IV-V": { trait: "叡智", color: "漆黒", name: "創造の叡智", narrative: "独創的な発想が知性と融合。既成概念を覆す新しい理論や現実を描き出す、魔法のような思考の持ち主。", core: "独創的な理論構築。" },
            "IV-VI": { trait: "叡智", color: "翡翠", name: "深遠なる知", narrative: "自己内省と真理の探求が一体化。表層の知識を捨て、魂の最奥にある真実を解き明かすための下降の旅。", core: "内省的な合理主義。" },
            "IV-VII": { trait: "叡智", color: "黄金", name: "叡智の支配", narrative: "知性をもって秩序を構築。自らの理論によって理想郷を築き、人々を導くための冷徹かつ完璧な戦略家。", core: "知による秩序形成。" },
            "IV-VIII": { trait: "叡智", color: "鋼鉄", name: "堅牢な知性", narrative: "不変の事実と誠実さを重んじる知性。大切な基盤を論理的に守り抜き、絶対に揺るがない安定を築きます。", core: "確実なデータの番人。" },
            "IV-IX": { trait: "叡智", color: "蒼空", name: "自在の叡智", narrative: "枠組みに縛られない自由な思考。常に最新の情報を学び、無限の可能性を証明し続ける知の冒険者。", core: "変化する絶対知。" },

            "V-I": { trait: "幻影", color: "紅玉", name: "創造の奔流", narrative: "創造的な美学に、圧倒的な推進力が宿ります。想像を絶するスピードで新しい現実を具現化する表現の先駆者。", core: "形なきものを焼く炎。" },
            "V-II": { trait: "幻影", color: "瑠璃", name: "美しき円環", narrative: "想像力による創造が、全体の調和と結びつきます。散らばった人々の心を、一つの美しい物語で繋ぎ合わせる。 ", core: "調和を創る魔法。" },
            "V-III": { trait: "幻影", color: "琥珀", name: "慈しみの幻影", narrative: "目に見えない癒やしを具現化。人々の痛みを美しい物語や芸術に昇華させ、孤独を溶かしていく創造的な救済。 ", core: "愛を描き出す想像力。" },
            "V-IV": { trait: "幻影", color: "白銀", name: "理の幻想", narrative: "独創性と論理性が高度にバランス。不可能を可能にするロジックを見出し、空想を現実へと変える魔法の設計図。 ", core: "緻密な創造性。" },
            "V-V": { trait: "幻影", color: "漆黒", name: "幻視の王", narrative: "創造性と虚実のあわいが最高潮。誰も見たことのない世界観を構築し、既成概念を完膚なきまでに揺さぶる魔術師。", core: "無限の想像力。" },
            "V-VI": { trait: "幻影", color: "翡翠", name: "深淵の幻影", narrative: "自己の深淵から美しきものを汲み上げます。表層的な美しさを捨て、魂の痛みを崇高な芸術へと昇華させる思索者。 ", core: "魂の叫びを形にする。" },
            "V-VII": { trait: "幻影", color: "黄金", name: "王者の幻想", narrative: "自らの美学によって秩序を構築。理想の世界を己の創造力で塗り替え、人々を魅了しながら導く絶対的な表現者。 ", core: "支配的な美意識。" },
            "V-VIII": { trait: "幻影", color: "鋼鉄", name: "守護の幻想", narrative: "不変の意志を創造的な形で表現。大切な伝統や絆を、新しい解釈で守り抜き、色褪せない土台を築きます。 ", core: "不変を創る知恵。" },
            "V-IX": { trait: "幻影", color: "蒼空", name: "自由な幻想", narrative: "何ものにも縛られず、無限の可能性を描き続けます。境界線を軽やかに越え、新しいリアリティを提示する飛翔する心。", core: "執着なき創造。" },

            "VI-I": { trait: "深淵", color: "紅玉", name: "情熱の深淵", narrative: "静寂の底に熱い意志が眠っています。内省の末に導き出された真実を、力強く現実に反映させる静かなる革命家。", core: "底知れぬ推進力。" },
            "VI-II": { trait: "深淵", color: "瑠璃", name: "円環の深淵", narrative: "因果とバランスを静かに見つめます。バラバラな出来事の底にある繋がりを見出し、調和を再構築する因果の観測者。 ", core: "沈黙の調和。" },
            "VI-III": { trait: "深淵", color: "琥珀", name: "慈愛の深淵", narrative: "他者の痛みの最奥まで降りていき、共鳴します。孤独の底で手を差し伸べ、魂を再生へと導く、静かなる救済の旅。", core: "寄り添う静寂。" },
            "VI-IV": { trait: "深淵", color: "白銀", name: "叡智の深淵", narrative: "本質的な問いを論理で突き詰めます。表層の知識を捨て、宇宙の真理や自己の正体に肉薄する、孤高の哲学者。", core: "究極の知性的探求。" },
            "VI-V": { trait: "深淵", color: "漆黒", name: "幻想の深淵", narrative: "深淵で見つけた真実を、独自の美学で表現。目に見えない魂の震えを具現化し、人々の固定観念を揺さぶる思想家。", core: "内なる真実の具現化。" },
            "VI-VI": { trait: "深淵", color: "翡翠", name: "絶対静寂", narrative: "本質的な問いと静寂が極致へ。自己内省の果てに、何ものにも依存しない純粋な魂の核へと到達した隠者。", core: "再誕のための下降。" },
            "VI-VII": { trait: "深淵", color: "黄金", name: "覇道の深淵", narrative: "深い沈黙から導き出した正義で秩序を築きます。自らの意志の根源を完璧に理解し、揺るぎない確信で世界を導く指導者。", core: "確信に満ちた支配。" },
            "VI-VIII": { trait: "深淵", color: "鋼鉄", name: "堅牢な深淵", narrative: "不変の意志を深淵の底に打ち込みます。何が起きても揺るがない自己の基準を持ち、大切なものを黙って守り続ける守護の盾。 ", core: "不動の自己基準。" },
            "VI-IX": { trait: "深淵", color: "蒼空", name: "自由な深淵", narrative: "深淵に潜りながらも、どこまでも軽やか。一つの真実に執着せず、境界線を越え続けることで自由を獲得する探求者。", core: "縛られない思索。" },

            "VII-I": { trait: "覇道", color: "紅玉", name: "覇道の奔流", narrative: "意志の貫徹と圧倒的な推進力が融合。自らの力で理想を形にし、瞬く間に世界を塗り替える、猛烈な開拓の王。 ", core: "止まらない支配。" },
            "VII-II": { trait: "覇道", color: "瑠璃", name: "円環の覇道", narrative: "秩序の構築が全体の調和を目的とします。混乱を治め、人々の間に公平な循環を作り出す、高潔な王道。 ", core: "調和のための力。" },
            "VII-III": { trait: "覇道", color: "琥珀", name: "慈愛の覇道", narrative: "守るべき存在への愛が力の源。弱きを助け、愛によって理想郷を築き上げる、献身的かつ力強い指導者。", core: "愛を貫く意志。" },
            "VII-IV": { trait: "覇道", color: "白銀", name: "叡智の覇道", narrative: "論理的な秩序を完璧に構築します。真理に基づいて世界を統治し、混乱を一切許さない、緻密な戦略を持つ勝者。", core: "知的な秩序。" },
            "VII-V": { trait: "覇道", color: "漆黒", name: "幻想の覇道", narrative: "自らの美学を世界に強いるほどの創造性。新しいリアリティを構築し、既存の秩序を美しく塗り替える革新的な王。", core: "創造による支配。" },
            "VII-VI": { trait: "覇道", color: "翡翠", name: "深淵の覇道", narrative: "魂の最奥にある確信から秩序を築きます。己の孤独と問いに向き合い続け、本質的な正義を体現する、孤高の指導者。", core: "内なる王土。" },
            "VII-VII": { trait: "覇道", color: "黄金", name: "絶対覇道", narrative: "意志の貫徹と秩序の構築が極致に。自らの力で完璧な理想を形にし、一切の停滞を許さず凱旋し続ける真の覇者。", core: "理想郷の構築。" },
            "VII-VIII": { trait: "覇道", color: "鋼鉄", name: "不朽の覇道", narrative: "不変の意志で秩序を守り抜きます。嵐の中でも揺るがず、築き上げた安定を永遠のものとする、鉄壁の統治。 ", core: "不動の秩序。" },
            "VII-IX": { trait: "覇道", color: "蒼空", name: "自由な覇道", narrative: "境界線を越え続けることで秩序を広げます。何ものにも縛られず、しかし確実に理想を実現していく軽やかな王。 ", core: "執着なき達成。" },

            "VIII-I": { trait: "堅牢", color: "紅玉", name: "奔流の堅牢", narrative: "守るべきもののために激しく戦います。不変の意志を推進力に変え、大切な基盤を脅かすものを徹底的に打破する守護者。 ", core: "動的な防壁。" },
            "VIII-II": { trait: "堅牢", color: "瑠璃", name: "円環の堅牢", narrative: "全体の調和を誠実に守り抜きます。散らばった縁を結び直し、揺るぎない土台の上で平和を維持し続ける不動の要。", core: "不変のバランス。" },
            "VIII-III": { trait: "堅牢", color: "琥珀", name: "慈愛の堅牢", narrative: "愛する人を守ることが絶対の使命。無償の奉仕が誠実な基盤となり、誰もが安心して戻れる安息地を築きます。", core: "癒やしの砦。" },
            "VIII-IV": { trait: "堅牢", color: "白銀", name: "叡智の堅牢", narrative: "不変の事実と論理で基盤を支えます。リスクを徹底的に分析し、確実なデータに基づいて安定を維持する知的な盾。 ", core: "知的な安定。" },
            "VIII-V": { trait: "堅牢", color: "漆黒", name: "幻想の堅牢", narrative: "独自の美学によって不変の価値を守ります。伝統を創造的に表現し直し、時代が変わっても色褪せない土台を築く芸術家。 ", core: "美しき土台。" },
            "VIII-VI": { trait: "堅牢", color: "翡翠", name: "深淵の堅牢", narrative: "魂の最奥にある信念を誠実に守り抜きます。孤独の中で見出した自己の真実を、何ものにも譲らない静かなる不朽。 ", core: "内なる基盤。" },
            "VIII-VII": { trait: "堅牢", color: "黄金", name: "覇道の堅牢", narrative: "自らの意志で築いた秩序を鉄壁の守りで維持。理想郷の基盤を誰にも侵させず、永遠の安定を約束する統治者。", core: "確固たる支配。" },
            "VIII-VIII": { trait: "堅牢", color: "鋼鉄", name: "絶対堅牢", narrative: "不変の意志と守護の力が極致へ。嵐の中でも微動だにせず、他者の絶対的な拠り所となり続ける不朽の守護神。", core: "誠実、忍耐、安定。" },
            "VIII-IX": { trait: "堅牢", color: "蒼空", name: "自由な堅牢", narrative: "何ものにも縛られないことで、逆に不変の自己を保ちます。境界線を越えながらも、芯の強さを失わない軽やかな盾。 ", core: "自由な安定。" },

            "IX-I": { trait: "自由", color: "紅玉", name: "奔流の自由", narrative: "枠組みを壊す情熱で前進します。圧倒的なエネルギーで境界線を突破し、無限の可能性を切り拓く、自由なる開拓者。", core: "変化を好む自由。" },
            "IX-II": { trait: "自由", color: "瑠璃", name: "円環の自由", narrative: "自在な変化が全体の調和に繋がります。縁に執着せず、しかし全ての巡り合わせを愛する軽やかな調律師。", core: "執着なき調和。" },
            "IX-III": { trait: "自由", color: "琥珀", name: "慈愛の自由", narrative: "愛によって境界線を越え続けます。誰に対しても等しく癒やしを届け、人々の孤独を溶かしていく博愛の旅人。", core: "自由な共感。" },
            "IX-IV": { trait: "自由", color: "白銀", name: "叡智の自由", narrative: "固定観念を排した純粋な知性。あらゆる枠を超えて学び、世界の真理を自由に解き明かす知の冒険者。", core: "縛られない知性。" },
            "IX-V": { trait: "自由", color: "漆黒", name: "幻想の自由", narrative: "無限の想像力で新しい現実を次々と描き出します。既存の美学を軽やかに超越し、魔法のような自由を体現する表現者。", core: "変幻自在な創造。" },
            "IX-VI": { trait: "自由", color: "翡翠", name: "深淵の自由", narrative: "魂の最奥にある真実すらも軽やかに手放し、新しい自分へと再誕し続けます。下降すらも飛翔に変える真理の冒険者。 ", core: "深き自由。" },
            "IX-VII": { trait: "自由", color: "黄金", name: "覇道の自由", narrative: "理想を形にしながらも、その形に固執しません。常に最高の状態を求めて変革し続け、無限の可能性を実現する王。", core: "支配なき達成。" },
            "IX-VIII": { trait: "自由", color: "鋼鉄", name: "堅牢な自由", narrative: "不変の意志を持ちながら、環境への適応力に優れます。嵐の中でも自分を見失わず、しかし柔軟に身をこなす、自由なる守護者。 ", core: "しなやかな盾。" },
            "IX-IX": { trait: "自由", color: "蒼空", name: "絶対自由", narrative: "枠組みを超越する軽やかさが極致へ。何ものにも縛られず、即興性と好奇心で無限の可能性を証明し続ける飛翔の精神。", core: "超越と自在。" }
        };

        const partInterpretations = {
            'I': { high: { title: '【特性】奔流のエネルギー', desc: '圧倒的な推進力で新しい時代を切り拓きます。' }, medium: { title: '【柔軟性】適度な推進力', desc: '必要に応じてアクセルを踏み、前進できます。' }, low: { title: '【潜在色】静寂への希求', desc: '無理に動くことよりも、立ち止まることを求めているかもしれません。' } },
            'II': { high: { title: '【特性】円環のバランス', desc: 'あらゆる縁を結び直し、調和をもたらします。' }, medium: { title: '【柔軟性】バランス感覚', desc: '周囲との関係性を適切に維持することができます。' }, low: { title: '【潜在色】個の確立', desc: '和を重んじすぎるあまり、自分の意志を後回しにしていませんか？' } },
            'III': { high: { title: '【特性】慈愛の抱擁', desc: '他者の痛みを分かち合い、癒やす力を持っています。' }, medium: { title: '【柔軟性】健全な共感', desc: '感情に流されすぎず、相手に寄り添うことができます。' }, low: { title: '【潜在色】理性的距離', desc: '感情よりも論理で世界を捉えようとしている時期かもしれません。' } },
            'IV': { high: { title: '【特性】叡智の光', desc: '真理を追求し、複雑な事象を鮮やかに解き明かします。' }, medium: { title: '【柔軟性】実用的な知性', desc: '必要な情報を収集し、論理的に判断できます。' }, low: { title: '【潜在色】直感への信頼', desc: '分析することに疲れ、感覚的なものを求めている可能性があります。' } },
            'V': { high: { title: '【特性】幻影の創造', desc: '独創的な発想で、新しいリアリティを描き出します。' }, medium: { title: '【柔軟性】適度な創造性', desc: '日常の中に遊び心や独自の工夫を取り入れられます。' }, low: { title: '【潜在色】現実的な基盤', desc: '想像の世界よりも、確実な現実を重視している時期です。' } },
            'VI': { high: { title: '【特性】深淵の洞察', desc: '孤独を友とし、魂の本質的な問いに向き合います。' }, medium: { title: '【柔軟性】健全な内省', desc: '折に触れて自分を見つめ直し、成長の糧にできます。' }, low: { title: '【潜在色】外的な活動', desc: '内面を深く見つめるよりも、外の世界との繋がりを求めています。' } },
            'VII': { high: { title: '【特性】覇道の意志', desc: '高い理想を掲げ、自らの力で秩序を構築します。' }, medium: { title: '【柔軟性】達成への意欲', desc: '具体的な目標を立て、着実に成果を出すことができます。' }, low: { title: '【潜在色】受容の安らぎ', desc: '競争や支配から離れ、ただ在ることを求めているかもしれません。' } },
            'VIII': { high: { title: '【特性】堅牢な誠実', desc: '不変の意志で、大切なものを守り抜きます。' }, medium: { title: '【柔軟性】安定した基盤', desc: '計画的に物事を進め、信頼を築くことができます。' }, low: { title: '【潜在色】変化の受容', desc: '保守的になりすぎず、新しい風を取り入れる必要を感じていませんか？' } },
            'IX': { high: { title: '【特性】自由の飛翔', desc: '枠組みに縛られず、無限の可能性を楽しみます。' }, medium: { title: '【柔軟性】柔軟な対応', desc: '環境の変化に応じて、自分を適応させることができます。' }, low: { title: '【潜在色】不変への憧れ', desc: '変化し続けることに疲れ、定住や不変を求めているかもしれません。' } }
        };

        // --- 以下ロジック（前バージョンを踏襲しつつ修正） ---
        let currentPartIndex = 0; 
        let currentQIndex = 0;
        const totalQuestions = quizData.reduce((sum, part) => sum + part.questions.length, 0);
        let answers = {};
        let myResultTraitId = '';
        let myResultColorId = '';
        let calculatedScores = {};
        let isQuizCompleted = false;

        function startQuiz() {
            answers = {}; currentPartIndex = 0; currentQIndex = 0; calculatedScores = {}; isQuizCompleted = false;
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('quiz-content').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            renderQuestion();
        }

        function renderQuestion() {
            const globalQIndex = currentPartIndex * 9 + currentQIndex;
            if (globalQIndex >= totalQuestions) { analyze(); return; }
            const part = quizData[currentPartIndex];
            document.getElementById('current-question-text').textContent = part.questions[currentQIndex];
            const progress = ((globalQIndex + 1) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `${globalQIndex + 1} / ${totalQuestions} 問`;
        }

        function handleAnswer(isYes) {
            const partId = quizData[currentPartIndex].id;
            if (!answers[partId]) answers[partId] = [];
            answers[partId][currentQIndex] = isYes;
            currentQIndex++;
            if (currentQIndex >= 9) { currentQIndex = 0; currentPartIndex++; }
            renderQuestion();
        }

        function analyze() {
            calculatedScores = {};
            quizData.forEach(p => { calculatedScores[p.id] = (answers[p.id] || []).filter(a => a).length; });
            let maxScore = -1, minScore = 10, traitId = 'I', colorId = 'I';
            quizData.forEach(p => {
                if (calculatedScores[p.id] > maxScore) { maxScore = calculatedScores[p.id]; traitId = p.id; }
                if (calculatedScores[p.id] < minScore) { minScore = calculatedScores[p.id]; colorId = p.id; }
            });
            myResultTraitId = traitId; myResultColorId = colorId; isQuizCompleted = true;
            renderResultView(traitId, colorId, true);
        }

        function renderResultView(traitId, colorId, isMyResult) {
            document.getElementById('quiz-section').classList.add('hidden');
            document.getElementById('all-results-section').classList.add('hidden');
            document.getElementById('result-section').classList.remove('hidden');
            setTimeout(() => window.scrollTo({ top: 0, behavior: 'auto' }), 10);

            const soulData = soulNarratives[`${traitId}-${colorId}`];
            document.getElementById('result-trait-name').textContent = soulData.trait;
            document.getElementById('result-color-name').textContent = soulData.color;
            document.getElementById('combo-name-display').textContent = soulData.name;
            document.getElementById('soul-core').textContent = soulData.core;
            document.getElementById('overall-description').textContent = soulData.narrative;

            if (isMyResult) {
                document.getElementById('score-analysis-block').classList.remove('hidden');
                document.getElementById('return-from-detail').classList.add('hidden');
                document.getElementById('back-to-list-button').classList.add('hidden');
                renderScoreAnalysis(calculatedScores);
            } else {
                document.getElementById('score-analysis-block').classList.add('hidden');
                document.getElementById('back-to-list-button').classList.remove('hidden');
                if (isQuizCompleted) document.getElementById('return-from-detail').classList.remove('hidden');
            }
        }

        function renderScoreAnalysis(scores) {
            const container = document.getElementById('full-analysis-container');
            container.innerHTML = '';
            quizData.forEach(part => {
                const s = scores[part.id];
                const level = s >= 7 ? 'high' : s >= 4 ? 'medium' : 'low';
                const info = partInterpretations[part.id][level];
                const colors = level === 'high' ? 'bg-red-50 border-red-500' : level === 'medium' ? 'bg-yellow-50 border-yellow-500' : 'bg-blue-50 border-blue-500';
                container.insertAdjacentHTML('beforeend', `
                    <div class="trait-box ${colors} border-l-4 p-4 rounded shadow-sm">
                        <div class="flex justify-between items-center mb-2"><h4 class="font-bold font-serif">${part.name}</h4><span class="text-xs font-bold">${s}/9</span></div>
                        <p class="text-sm font-bold text-gray-700 mb-1">${info.title}</p>
                        <p class="text-xs text-gray-600 leading-relaxed">${info.desc}</p>
                    </div>
                `);
            });
        }

        function showAllResults() {
            document.getElementById('result-section').classList.add('hidden');
            document.getElementById('all-results-section').classList.remove('hidden');
            setTimeout(() => window.scrollTo({ top: 0, behavior: 'auto' }), 10);
            if (isQuizCompleted) document.getElementById('back-to-my-result-btn').classList.remove('hidden');
            renderFilterButtons();
            filterResults('ALL');
        }

        function renderFilterButtons() {
            const container = document.getElementById('trait-filters');
            container.innerHTML = `<button onclick="filterResults('ALL')" class="px-4 py-2 bg-gray-800 text-white rounded-full text-sm font-bold m-1">ALL</button>`;
            quizData.forEach(p => {
                container.insertAdjacentHTML('beforeend', `<button onclick="filterResults('${p.id}')" class="px-3 py-2 bg-white border border-gray-300 rounded-full text-xs font-bold m-1">${p.name}</button>`);
            });
        }

        function filterResults(fId) {
            const container = document.getElementById('full-name-list');
            container.innerHTML = '';
            Object.keys(soulNarratives).forEach(key => {
                const [tId, cId] = key.split('-');
                if (fId !== 'ALL' && tId !== fId) return;
                const d = soulNarratives[key];
                container.insertAdjacentHTML('beforeend', `
                    <div class="grid-item p-4 border border-gray-200 rounded-lg bg-gray-50 hover:bg-white shadow-sm" onclick="renderResultView('${tId}', '${cId}', false)">
                        <div class="text-xs text-gray-400 mb-1 font-bold">${d.trait} × ${d.color}</div>
                        <div class="text-lg font-bold text-gray-800 mb-1 font-serif">【<span class="text-red-700">${d.name}</span>】</div>
                        <div class="text-xs text-gray-500 line-clamp-1">${d.core}</div>
                    </div>
                `);
            });
        }

        function showMyResult() { if (isQuizCompleted) renderResultView(myResultTraitId, myResultColorId, true); }
    </script>
</body>
