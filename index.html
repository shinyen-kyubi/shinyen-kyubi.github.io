<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九尾の暗号｜心炎九尾 心理テスト</title>
    <meta name="description" content="あなたの魂が放つ色と尻尾を解読する「九尾の暗号」心理テスト。">
    <style>
        body { font-family: sans-serif; background-color: #0d0d0d; color: #e0e0e0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #1a1a1a; padding: 40px; border-radius: 20px; box-shadow: 0 0 30px rgba(211,47,47,0.3); width: 90%; max-width: 500px; text-align: center; border: 1px solid #333; }
        h1 { color: #ff5252; letter-spacing: 4px; }
        button { background: #262626; color: #fff; border: 1px solid #d32f2f; padding: 15px; border-radius: 10px; cursor: pointer; width: 100%; margin-top: 10px; font-size: 18px; }
        button:hover { background: #d32f2f; }
        #result-screen { display: none; }
    </style>
</head>
<body>
    <div class="container" id="quiz-screen">
        <h1>心炎九尾</h1>
        <div id="question-text" style="font-size: 20px; margin: 30px 0;">読み込み中...</div>
        <button onclick="answer(1)">強くそう思う</button>
        <button onclick="answer(0)">そう思わない</button>
    </div>
    <div class="container" id="result-screen">
        <h1 id="result-name" style="color:#ffd700;"></h1>
        <p id="result-desc"></p>
        <button onclick="location.reload()">もう一度診断する</button>
    </div>
    <script>
        const parts = ["奔流", "灼熱", "静寂", "疾風", "豊穣", "閃光", "深淵", "慈愛", "輪廻"];
        const colors = ["紅", "蒼", "翠", "琥珀", "漆黒", "純白", "菫", "黄金", "灰"];
        let current = 0; let score = 0;
        function update() { document.getElementById("question-text").innerText = "【" + parts[current] + "の試練】\nこの性質が自分にあると感じますか？"; }
        function answer(v) { if(v) score += Math.pow(2, current); current++; if(current < 9) update(); else show(); }
        function show() {
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            const p = parts[score % 9]; const c = colors[Math.floor((score/511)*8)];
            document.getElementById("result-name").innerText = p + "の尻尾：" + c;
            document.getElementById("result-desc").innerText = "解読完了。あなたの魂は" + p + "の性質を持ち、" + c + "の輝きを放っています。";
        }
        update();
    </script>
</body>
</html>
