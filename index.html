<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九尾の暗号（コード）</title>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: #2a2a2a; padding: 30px; border-radius: 15px; box-shadow: 0 0 20px rgba(255,0,0,0.2); width: 90%; max-width: 500px; text-align: center; border: 2px solid #d32f2f; }
        h1 { color: #d32f2f; font-size: 24px; margin-bottom: 20px; }
        .question { font-size: 18px; margin-bottom: 30px; min-height: 60px; line-height: 1.6; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        button { background: #444; color: white; border: 1px solid #666; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button:hover { background: #d32f2f; border-color: #fff; }
        #result-screen { display: none; }
        .result-title { font-size: 22px; color: #ffd700; margin-bottom: 15px; }
        .result-desc { text-align: left; line-height: 1.8; font-size: 14px; background: #333; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <div class="container" id="quiz-screen">
        <h1>九尾の暗号</h1>
        <div id="question-text" class="question">読み込み中...</div>
        <div class="btn-group">
            <button onclick="answer(1)">はい</button>
            <button onclick="answer(0)">いいえ</button>
        </div>
    </div>

    <div class="container" id="result-screen">
        <h1>診断結果</h1>
        <div id="result-name" class="result-title"></div>
        <div id="result-desc" class="result-desc"></div>
        <br>
        <button onclick="location.reload()">最初からやり直す</button>
    </div>

    <script>
        const parts = ["奔流", "灼熱", "静寂", "疾風", "豊穣", "閃光", "深淵", "慈愛", "輪廻"];
        const colors = ["紅", "蒼", "翠", "琥珀", "漆黒", "純白", "菫", "黄金", "灰"];
        
        let currentPart = 0;
        let score = 0;

        function updateQuestion() {
            document.getElementById("question-text").innerText = `【${parts[currentPart]}の試練】\n自分の直感を信じて行動する方だ`;
        }

        function answer(val) {
            score += val * Math.pow(2, currentPart);
            currentPart++;
            if (currentPart < 9) {
                updateQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById("quiz-screen").style.display = "none";
            document.getElementById("result-screen").style.display = "block";
            
            const partIdx = score % 9;
            const colorIdx = Math.floor(score / 9) % 9;
            
            const resultName = `${parts[partIdx]}の尻尾：${colors[colorIdx]}`;
            document.getElementById("result-name").innerText = resultName;
            document.getElementById("result-desc").innerText = "あなたの魂が示す九尾の暗号が解読されました。この結果はあなたの潜在的な可能性と、今直面している運命の断片を示しています。";
        }

        updateQuestion();
    </script>
</body>
</html>
