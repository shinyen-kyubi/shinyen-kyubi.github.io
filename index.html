<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心炎九尾 | 真・九箇条の神託</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Shippori+Mincho:wght@600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans JP', sans-serif;
            background-color: #fcfaf8;
            color: #2d3436;
        }
        .font-serif { font-family: 'Shippori Mincho', serif; }
        
        .fox-container {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.08));
        }

        .result-card {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(15px);
            border-radius: 40px;
            border: 1px solid rgba(0,0,0,0.05);
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
        }

        .sticky-nav {
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            z-index: 100;
            display: flex;
            gap: 0.5rem;
        }
        .nav-btn {
            background: white;
            padding: 0.6rem 1.2rem;
            border-radius: 20px;
            font-size: 13px;
            font-weight: bold;
            border: 1px solid #e0e0e0;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .kanji-stroke {
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .divine-item {
            border-left: 2px solid rgba(255,255,255,0.2);
            padding-left: 1.5rem;
            margin-bottom: 2rem;
            transition: all 0.3s ease;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <nav class="sticky-nav">
        <button onclick="showSection('start-screen')" class="nav-btn">🏠 TOP</button>
        <button onclick="showSection('catalog-screen')" class="nav-btn">📖 図録</button>
    </nav>

    <div class="max-w-4xl mx-auto">
        
        <header id="header" class="text-center py-12">
            <div id="main-visual" class="fox-container mb-8"></div>
            <h1 class="text-6xl font-serif text-orange-900 mb-6 tracking-tighter">心炎九尾</h1>
            <p class="text-slate-400 tracking-[0.5em] text-[11px] uppercase font-bold">The Nine-Tailed Soul Mirror</p>
        </header>

        <main>
            <!-- スタート画面 -->
            <section id="start-screen" class="text-center space-y-12">
                <div class="bg-white/70 p-12 rounded-[4rem] border border-white shadow-inner">
                    <p class="text-2xl font-serif text-slate-800 mb-8 leading-relaxed">
                        九つの「属性」と、九つの「色彩」。
                    </p>
                    <p class="text-sm text-slate-500 leading-relaxed max-w-lg mx-auto">
                        あなたが纏う役割としての「属性」と、<br>
                        心の深淵に眠る宝石のような「色彩」。<br>
                        その交点に、真実のあなたが浮かび上がります。
                    </p>
                </div>
                <div class="flex flex-col sm:flex-row gap-6 justify-center pt-6">
                    <button onclick="startQuiz()" class="px-14 py-6 bg-orange-900 text-white rounded-full font-serif text-2xl shadow-2xl hover:bg-black transition-all hover:scale-105 active:scale-95">
                        深層鑑定を開始する
                    </button>
                </div>
            </section>

            <!-- クイズ画面 -->
            <section id="quiz-screen" class="hidden">
                <div class="max-w-xl mx-auto">
                    <div class="mb-14 text-center">
                        <div class="h-1.5 w-full bg-slate-100 rounded-full overflow-hidden mb-8">
                            <div id="progress" class="h-full bg-orange-700 transition-all duration-700 w-0"></div>
                        </div>
                        <span id="category-label" class="text-[12px] font-bold text-orange-800 tracking-[0.3em] uppercase"></span>
                    </div>
                    <div class="bg-white p-16 rounded-[60px] shadow-sm mb-12 min-h-[250px] flex items-center justify-center border border-slate-50">
                        <p id="question" class="text-2xl font-serif text-center leading-relaxed text-slate-800"></p>
                    </div>
                    <div class="grid grid-cols-2 gap-8 px-6">
                        <button onclick="answer(true)" class="py-8 bg-orange-900 text-white rounded-[2.5rem] font-bold text-xl shadow-xl hover:bg-black transition-transform active:scale-95">あてはまる</button>
                        <button onclick="answer(false)" class="py-8 bg-white text-slate-400 border-2 border-slate-100 rounded-[2.5rem] font-bold text-xl hover:bg-slate-50 transition-transform active:scale-95">ちがわない</button>
                    </div>
                </div>
            </section>

            <!-- 結果画面 -->
            <section id="result-screen" class="hidden space-y-12 pb-24">
                <div class="result-card p-12 sm:p-24">
                    <div class="text-center mb-16">
                        <div id="result-visual" class="fox-container mb-12"></div>
                        <h2 id="result-title" class="text-4xl md:text-5xl font-serif mb-10 leading-snug"></h2>
                        <div id="result-summary" class="grid grid-cols-1 md:grid-cols-2 gap-10 text-left mt-16">
                            <div class="p-10 bg-slate-50 rounded-[3rem] border border-slate-100">
                                <h3 class="text-[11px] font-bold text-orange-900 mb-6 tracking-[0.3em] uppercase opacity-60">【属性の真髄】</h3>
                                <p id="impression-text" class="text-base leading-relaxed text-slate-600 font-serif"></p>
                            </div>
                            <div class="p-10 bg-slate-50 rounded-[3rem] border border-slate-100">
                                <h3 class="text-[11px] font-bold text-orange-900 mb-6 tracking-[0.3em] uppercase opacity-60">【色彩の渇望】</h3>
                                <p id="desire-text" class="text-base leading-relaxed text-slate-600 font-serif"></p>
                            </div>
                        </div>
                    </div>

                    <div id="divine-panel" class="rounded-[4rem] p-8 sm:p-16 text-white overflow-hidden relative">
                        <div id="bg-glow" class="absolute inset-0 opacity-20 pointer-events-none"></div>
                        <h3 class="text-3xl font-serif mb-14 border-b border-white/20 pb-8 tracking-[0.2em] relative z-10 text-center">真・九箇条の神託</h3>
                        <div id="divine-list" class="grid grid-cols-1 md:grid-cols-1 gap-4 relative z-10"></div>
                    </div>
                </div>
                <div class="flex flex-col sm:flex-row gap-6">
                    <button onclick="showSection('start-screen')" class="flex-1 py-6 bg-white border-2 border-orange-900 text-orange-900 rounded-full font-bold hover:bg-orange-50 transition-all">最初からやり直す</button>
                    <button onclick="showSection('catalog-screen')" class="flex-1 py-6 bg-orange-900 text-white rounded-full font-bold hover:bg-black transition-all">図録を確認する</button>
                </div>
            </section>

            <!-- 図録画面 -->
            <section id="catalog-screen" class="hidden pb-24">
                <div class="mb-20 text-center">
                    <h2 class="text-4xl font-serif text-slate-800 mb-6">九尾の深層図録</h2>
                    <p class="text-sm text-slate-400">属性と九石の色彩による全パターンの相関</p>
                </div>
                <div id="catalog-content" class="space-y-24"></div>
            </section>
        </main>
    </div>

    <script>
        // 属性データ
        const traits = [
            { id: 'A', name: '奔流', modern: '改革するリーダー', glyph: 'M20,30 Q50,10 80,30 M20,50 Q50,30 80,50 M20,70 Q50,50 80,70 M40,20 L60,80 M30,20 L50,80 M50,20 L70,80', impression: "常に変化を求め、停滞を打破する力。周囲はあなたの決断に「未来」を感じています。立ち止まることなく進み続ける勇者です。" },
            { id: 'B', name: '円環', modern: '究極の安定者', glyph: 'M50,15 A35,35 0 1,1 49.9,15 Z M50,30 A20,20 0 1,1 49.9,30 Z M50,15 L50,30 M50,70 L50,85', impression: "調和を重んじ、物事を円滑に収める力。あなたの周りには常に穏やかな秩序が保たれています。すべてを包み込み、循環させる聖域です。" },
            { id: 'C', name: '慈愛', modern: '慈愛のサポーター', glyph: 'M50,30 C30,30 20,50 50,80 C80,50 70,30 50,30 M35,45 L45,45 M55,45 L65,45 M45,60 L55,60', impression: "他者の痛みを感じ、寄り添う力。誰のことも見捨てない圧倒的な優しさが、人々の心の拠り所となっています。あなたは無償の愛の体現者です。" },
            { id: 'D', name: '叡智', modern: '冷静な戦略家', glyph: 'M25,25 L75,25 L75,75 L25,75 Z M40,25 L40,75 M60,25 L60,75 M25,50 L75,50 M30,85 L70,85', impression: "物事の本質を論理的に見抜く力。感情に流されず、最適解を導き出すその姿に、人々は絶対的な信頼を寄せています。あなたは静かなる賢者です。" },
            { id: 'E', name: '幻影', modern: '孤高の表現者', glyph: 'M20,20 L80,80 M80,20 L20,80 M50,10 L50,90 M10,50 L90,50 M30,30 Q50,50 70,30 Q50,50 30,70 Q50,50 70,70', impression: "常識に囚われない独自の感性。捉えどころのない不思議な魅力が、周囲を惹きつけて止みません。あなたが見せているのは、一瞬の夢のような芸術です。" },
            { id: 'F', name: '深淵', modern: '不屈の探究者', glyph: 'M30,20 L70,20 L50,90 Z M40,40 L60,40 M45,55 L55,55 M48,70 L52,70', impression: "一見静かだが、底知れない情熱を秘める力。一度決めた道を極めるまで妥協しない強さは、時に畏怖の対象となります。あなたは真理を追う隠者です。" },
            { id: 'G', name: '覇道', modern: '頼れる支配者', glyph: 'M30,20 L70,20 M50,20 L50,80 M25,40 L75,40 M25,60 L75,60 M20,80 L80,80 M40,30 L40,70 M60,30 L60,70', impression: "圧倒的な存在感で場を支配する力。弱きを守り、強きを挫くその背中に、多くの人が希望と勇気を見出しています。あなたは王の器を持つ者です。" },
            { id: 'H', name: '堅牢', modern: '不屈の守護者', glyph: 'M25,20 L75,20 L75,80 L25,80 Z M25,40 L75,40 M25,60 L75,60 M50,20 L50,80 M35,85 L65,85', impression: "何者にも動じない、誠実で強固な信念。あなたがそこにいるだけで、組織や仲間は決して揺らぐことはありません。あなたは最後の一線を守る盾です。" },
            { id: 'I', name: '自由', modern: '自由な開拓者', glyph: 'M20,20 Q50,50 80,20 M20,80 Q50,50 80,80 M50,10 C80,10 80,90 50,90 C20,90 20,10 50,10', impression: "枠組みを飛び越え、新しい価値を生み出す力。多才で好奇心旺盛なあなたの行動は、周囲に常に刺激と解放感を与えます。あなたは風のように生きる旅人です。" }
        ];

        // 九石の色彩
        const desires = [
            { id: 'A', name: '紅玉', modern: '情熱の覚醒', hex: '#e11d48', dark: '#4c0519', wish: "「自分を燃やし尽くすほどの情熱的な何か」に出会いたい" },
            { id: 'B', name: '瑠璃', modern: '絶対的静寂', hex: '#2563eb', dark: '#172554', wish: "「誰にも邪魔されない、深海のような孤独と平穏」を守り抜きたい" },
            { id: 'C', name: '琥珀', modern: '永遠の保護', hex: '#d97706', dark: '#451a03', wish: "「大切なものや思い出を、時を止めて永遠に保存」していたい" },
            { id: 'D', name: '白銀', modern: '無垢な清廉', hex: '#94a3b8', dark: '#0f172a', wish: "「濁りなく、潔く、正しく、美しい精神」であり続けたい" },
            { id: 'E', name: '漆黒', modern: '支配的深淵', hex: '#1e293b', dark: '#020617', wish: "「すべてを飲み込み、何者にも染まらない絶対の優位」でありたい" },
            { id: 'F', name: '翡翠', modern: '再生の調和', hex: '#10b981', dark: '#064e3b', wish: "「傷ついた心や環境を、穏やかに再生させ調和」させたい" },
            { id: 'G', name: '黄金', modern: '至高の栄華', hex: '#fbbf24', dark: '#422006', wish: "「他者から眩しいと仰がれる、最高峰の称賛と価値」を手に入れたい" },
            { id: 'H', name: '鋼鉄', modern: '不屈の決意', hex: '#64748b', dark: '#1e293b', wish: "「何が起きても決して折れない、強固な意志と肉体」が欲しい" },
            { id: 'I', name: '蒼空', modern: '無限の解放', hex: '#0ea5e9', dark: '#082f49', wish: "「あらゆる束縛を脱ぎ捨て、どこまでも高く遠く」へ行きたい" }
        ];

        function drawKyuubi(traitId, colorHex, size = 300) {
            let tails = "";
            for (let i = 0; i < 9; i++) {
                const angle = -75 + (i * 18.75);
                const color = colorHex || desires[i].hex;
                const opacity = colorHex ? (0.12 + (i * 0.08)) : 0.55;
                tails += `<g transform="rotate(${angle}, 50, 85)">
                    <path d="M50,85 C65,65 75,40 50,10 C25,40 35,65 50,85" fill="${color}" fill-opacity="${opacity}" stroke="${color}" stroke-width="0.2"/>
                </g>`;
            }
            const accentColor = colorHex || "#94a3b8";
            const kanjiContent = traitId ? `
                <g transform="translate(40, 52) scale(0.2)" stroke="${colorHex}" stroke-width="5" fill="none" class="kanji-stroke">
                    <path d="${traits.find(t => t.id === traitId).glyph}" />
                </g>` : "";

            return `<svg viewBox="0 0 100 100" width="${size}" height="${size}">
                <path d="M50,85 Q40,80 38,65 Q38,45 50,40 Q62,45 62,65 Q60,80 50,85" fill="white" stroke="${accentColor}" stroke-width="0.4" />
                <path d="M42,45 L41,32 L47,43 M58,45 L59,32 L53,43" fill="none" stroke="${accentColor}" stroke-width="0.8"/>
                ${tails}
                ${kanjiContent}
            </svg>`;
        }

        const questions = {
            'A': ["現状に満足せず常に改善案を探している", "決断の速さが自分の持ち味だ", "古いルールを壊すことに抵抗がない"],
            'B': ["自分よりも場の空気を優先する", "争いごとは時間の無駄だと思う", "物事がルーチン通りに進むと安心する"],
            'C': ["困っている人を見過ごせない", "聞き上手だと言われることが多い", "誰かの成長を支えるのが喜びだ"],
            'D': ["感情よりもデータや論理を信じる", "問題を分析するのが得意だ", "「なぜ？」を突き詰めるのが好きだ"],
            'E': ["自分にしか分からない世界がある", "人と同じことはしたくない", "空想や夢想に浸ることがよくある"],
            'F': ["一つのことを深く掘り下げたい", "群れるよりも一人の時間を好む", "自分の弱さを他人に見せない"],
            'G': ["自分が中心になって進めたい", "他人の期待に応える自信がある", "困難な壁ほど燃えるタイプだ"],
            'H': ["約束や時間は厳守すべきだ", "不屈の精神を持っている自負がある", "一度始めたことは最後までやり抜く"],
            'I': ["予定に縛られるのは苦手だ", "新しい体験のために環境を変えたい", "何事も楽しむことが第一だ"]
        };

        let currentIdx = 0, currentQ = 0, scores = {};
        const tIds = Object.keys(questions);

        function showSection(id) {
            ['start-screen', 'quiz-screen', 'result-screen', 'catalog-screen'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            if(id === 'catalog-screen') buildCatalog();
            window.scrollTo(0,0);
        }

        function startQuiz() {
            currentIdx = 0; currentQ = 0; scores = {};
            showSection('quiz-screen');
            renderQ();
        }

        function renderQ() {
            const tid = tIds[currentIdx];
            document.getElementById('category-label').textContent = `深層鑑定中：魂の断面`;
            document.getElementById('question').textContent = questions[tid][currentQ];
            document.getElementById('progress').style.width = `${((currentIdx * 3 + currentQ + 1) / 27) * 100}%`;
        }

        function answer(isYes) {
            const tid = tIds[currentIdx];
            scores[tid] = (scores[tid] || 0) + (isYes ? 1 : 0);
            currentQ++;
            if(currentQ >= 3) { currentQ = 0; currentIdx++; }
            if(currentIdx >= 9) finish(); else renderQ();
        }

        function finish() {
            let maxT = 'A', minT = 'A', maxV = -1, minV = 10;
            tIds.forEach(id => {
                if(scores[id] > maxV) { maxV = scores[id]; maxT = id; }
                if(scores[id] < minV) { minV = scores[id]; minT = id; }
            });
            if(maxT === minT) minT = tIds.find(id => id !== maxT) || 'B';
            showResult(maxT, minT);
        }

        function showResult(tid, cid) {
            const t = traits.find(x => x.id === tid);
            const d = desires.find(x => x.id === cid);
            showSection('result-screen');
            document.getElementById('result-visual').innerHTML = drawKyuubi(tid, d.hex);
            
            document.getElementById('result-title').innerHTML = `
                <div class="mb-4">
                    <span class="text-slate-800">${t.name}（${t.modern}）</span><br>
                    <span class="text-slate-300 text-3xl my-2 block">×</span>
                    <span style="color:${d.hex}">${d.name}（${d.modern}）</span>
                </div>
            `;
            
            document.getElementById('impression-text').textContent = t.impression;
            document.getElementById('desire-text').textContent = `あなたの内なる輝きは【${d.name}】。それは「${d.wish}」という、魂の深淵に刻まれた渇望を象徴しています。`;
            document.getElementById('divine-panel').style.backgroundColor = d.dark;
            document.getElementById('bg-glow').style.background = `radial-gradient(circle, ${d.hex} 0%, transparent 70%)`;

            const list = document.getElementById('divine-list');
            list.innerHTML = "";
            
            const divineTitles = [
                "其の一：属性の理（ことわり）",
                "其の二：色彩の真意",
                "其の三：魂のバランス",
                "其の四：外界との接触",
                "其の五：深淵の警告",
                "其の六：覚醒への鍵",
                "其の七：運命の転換",
                "其の八：至福の源泉",
                "其の九：至上の教え"
            ];

            const divineContents = [
                `あなたが現世で振るう力は【${t.name}】です。それはあなたが生存のために選んだ最も強力な武器です。`,
                `心の底に沈む【${d.name}】の色彩は、あなたの行動の裏側にある「本当の理由」を物語っています。`,
                `【${t.modern}】としての仮面が苦しくなった時、その【${d.name}】の願いを自分自身で認めてあげなさい。`,
                `他者はあなたの【${t.name}】を頼りにしますが、あなた自身が真に求めているのは【${d.modern}】であることを忘れてはなりません。`,
                `渇望が強すぎると、【${d.name}】の輝きは影となり、あなた自身を飲み込む迷宮に変わる恐れがあります。`,
                `日常の中に【${d.name}】を象徴する小さな時間を持ちなさい。それがあなたの【${t.name}】としての力を最大化します。`,
                `困難が訪れた時こそ、表面的な解決ではなく、あなたの魂が【${d.wish}】としているか自問しなさい。`,
                `あなたが真の幸福を感じるのは、【${t.name}】としての成功ではなく、【${d.name}】の色彩が満たされた瞬間です。`,
                `己の「属性」を理解し、その根底にある「色彩」を慈しみなさい。二つの光が重なった時、あなたの人生は真の芸術となります。`
            ];

            divineTitles.forEach((title, i) => {
                const div = document.createElement('div');
                div.className = "divine-item";
                div.innerHTML = `
                    <h4 class="font-bold mb-2 tracking-widest text-sm uppercase opacity-100" style="color:${d.hex}">${title}</h4>
                    <p class="text-white opacity-80 text-sm leading-relaxed">${divineContents[i]}</p>
                `;
                list.appendChild(div);
            });
        }

        function buildCatalog() {
            const container = document.getElementById('catalog-content');
            container.innerHTML = "";
            traits.forEach(t => {
                const group = document.createElement('div');
                group.innerHTML = `<h3 class="text-2xl font-serif mb-10 border-l-8 border-orange-900 pl-6 text-slate-800">${t.name}（${t.modern}）</h3>`;
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-3 sm:grid-cols-5 md:grid-cols-9 gap-4";
                desires.forEach(d => {
                    const item = document.createElement('div');
                    item.className = "cursor-pointer text-center p-2 hover:bg-slate-50 rounded-xl transition-all";
                    item.onclick = () => showResult(t.id, d.id);
                    item.innerHTML = `
                        <div class="mb-2 flex justify-center">${drawKyuubi(t.id, d.hex, 60)}</div>
                        <div class="text-[9px] font-serif truncate" style="color:${d.hex}">${d.name}</div>
                    `;
                    grid.appendChild(item);
                });
                group.appendChild(grid);
                container.appendChild(group);
            });
        }

        window.onload = () => {
            document.getElementById('main-visual').innerHTML = drawKyuubi(null, null, 280);
        };
    </script>
</body>
</html>
